                <div><p class="text-indigo-200 text-sm">เพศ</p><p class="text-lg font-semibold" id="p-sex">-</p></div>
                <div><p class="text-indigo-200 text-sm">วันเกิด</p><p class="text-lg font-semibold" id="p-dob">-</p></div>
                <div><p class="text-indigo-200 text-sm">ที่อยู่</p><p class="text-sm" id="p-address">-</p></div>
            </div>
        </div>

            <div id="checkboxContainer" class="flex flex-wrap gap-3">
                <!-- Checkboxes will be rendered here -->
            </div>
        </div>

        <!-- พื้นที่ Render กลาง -->
        <div id="renderArea" class="bg-white rounded-xl border-2 border-dashed border-gray-300 p-6 mb-6 transition-all min-h-[200px]">
            <div id="emptyState" class="py-10 text-center text-gray-400">
                <svg class="mx-auto h-12 w-12 mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />

            </div>
            <div id="activeState" class="hidden space-y-6 text-sm">

            </div>
        </div>

        const jsonDisplay = document.getElementById('jsonDisplay');
        const emptyState = document.getElementById('emptyState');
        const activeState = document.getElementById('activeState');

        data.forEach((item, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = item.patient.name[0];
            selector.appendChild(option);
        });

        selector.addEventListener('change', (e) => {
            const index = e.target.value;
            if (index === "") { hideAll(); return; }
            const person = data[index];
            renderPatientInfo(person.patient);
            renderDateCheckboxes(person.answers.timestamp);
            // Default: ประมวลผลทันทีเพราะ checkbox ถูกติ๊กทั้งหมดแล้ว
            updateJsonDisplay(index);
        });

        function renderPatientInfo(p) {
            document.getElementById('p-name').textContent = p.name[0];
            document.getElementById('p-sex').textContent = p.sex[0] === 'male' ? 'ชาย' : 'หญิง';
            document.getElementById('p-dob').textContent = p.dob[0];
            document.getElementById('p-address').textContent = p.address[0];
            patientInfo.classList.remove('hidden');
        }

        function renderDateCheckboxes(timestamps) {
            checkboxContainer.innerHTML = '';
            timestamps.forEach((ts, i) => {
                const dateObj = new Date(ts);
                const dateStr = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
                const label = document.createElement('label');
                label.className = "flex items-center space-x-2 bg-gray-100 p-3 rounded-lg cursor-pointer hover:bg-gray-200 transition-all border border-gray-200";

                label.innerHTML = `<input type="checkbox" value="${i}" class="date-checkbox w-5 h-5 text-indigo-600 rounded" checked><span class="text-gray-700 font-medium">${dateStr}</span>`;
                checkboxContainer.appendChild(label);
            });
            document.querySelectorAll('.date-checkbox').forEach(cb => {
                cb.addEventListener('change', () => updateJsonDisplay(selector.value));
            });
            dateSection.classList.remove('hidden');
        }

        function updateJsonDisplay(patientIndex) {
            const selectedIndices = Array.from(document.querySelectorAll('.date-checkbox:checked')).map(cb => parseInt(cb.value));
            if (selectedIndices.length === 0) { answersSection.classList.add('hidden'); emptyState.classList.remove('hidden'); activeState.classList.add('hidden'); return; }

        function getBPColor(sbp, dbp) {
            const s = parseFloat(sbp); const d = parseFloat(dbp);
            if (s >= 180 || d >= 110) return 'cell-red';
            if (s >= 160 || d >= 100) return 'cell-orange';
            if (s >= 140 || d >= 90) return 'cell-yellow';
            return 'cell-green';
        }
        function getHRColor(hr) { const h = parseFloat(hr); return (h < 50 || h > 100) ? 'cell-orange' : 'cell-green'; }
        function getBMIColor(bmi) {
            const b = parseFloat(bmi);
            if (b < 18.5) return 'cell-orange'; if (b < 19) return 'cell-yellow';
            if (b <= 23.5) return 'cell-green'; if (b <= 25) return 'cell-yellow';
            return 'cell-orange';
        }
        function getWHRColor(whr) { return parseFloat(whr) > 0.5 ? 'cell-yellow' : 'cell-green'; }
        function getTrendText(cur, prev, label) {
            let status = label === "ความดันโลหิต" ? (cur >= 140 ? "สูง" : "ปกติ") : (cur > 23.5 ? "เกินเกณฑ์" : cur < 18.5 ? "ต่ำกว่าเกณฑ์" : "ปกติ");
            if (isNaN(prev)) return `${label}อยู่ในเกณฑ์ ${status}`;
            let trend = cur > prev ? "แต่มีแนวโน้มเพิ่มขึ้น" : cur < prev ? "แต่มีแนวโน้มลดลง" : "และคงที่";
            if (status === "สูง" && cur > prev) return `${label}อยู่ในเกณฑ์ สูง และแย่ลงกว่าครั้งที่แล้ว`;
            if (status === "สูง" && cur < prev) return `${label}อยู่ในเกณฑ์ สูง แต่มีแนวโน้มดีขึ้น (ลดลง)`;
            return `${label}อยู่ในเกณฑ์ ${status} ${trend}`;
        }

            tableHTML += `</tr></thead><tbody class="divide-y">`;

            }
            summaryHTML += `</ul></div>`;
            div.innerHTML = `<h4 class="text-lg font-bold text-gray-800 border-l-4 border-green-500 pl-2 mb-4">ส่วนที่ 3: สัญญาณชีพและสัดส่วนร่างกาย</h4>` + tableHTML + summaryHTML;

            const alc = filteredAnswers['form-ncd-alc-status'] || [];
            const alert = filteredAnswers['form-ncd-smoke-alc-alert'] || [];
            let content = `<h4 class="text-lg font-bold text-gray-800 border-l-4 border-gray-500 pl-2 mb-4">ส่วนที่ 6: สารเสพติดและแอลกอฮอล์</h4><div class="flex flex-wrap gap-4 text-xs">`;
            timestamps.forEach((ts, i) => {
                const s = smoke[i] === 'active' ? '🔴 สูบ' : '✅ ไม่สูบ';
                const a = alc[i] === 'active' ? '🔴 ดื่ม' : '✅ ไม่ดื่ม';
                content += `<div class="bg-gray-50 p-2 rounded border border-gray-200 min-w-[100px] text-center"><p class="font-bold mb-1">${new Date(ts).toLocaleDateString('th-TH', {day:'2-digit', month:'2-digit'})}</p><p>${s}</p><p>${a}</p></div>`;
            });
            content += `</div><p class="mt-4 p-2 bg-gray-100 rounded text-[13px]"><b>ข้อแนะนำล่าสุด:</b> ${alert.at(-1) || '-'}</p>`;
            div.innerHTML = content;
            return div;
        }

        function hideAll() {
            patientInfo.classList.add('hidden');
            dateSection.classList.add('hidden');
            answersSection.classList.add('hidden');
            emptyState.classList.remove('hidden');
            activeState.classList.add('hidden');
        }

        function copyJson() {
            const text = jsonDisplay.textContent;
            const temp = document.createElement('textarea');
            document.body.appendChild(temp);
            temp.value = text;
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
        }
    </script>
</body>
</html>
