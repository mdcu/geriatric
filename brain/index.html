<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>เกมทดสอบสมาธิ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
            background-color: #f3f4f6;
            user-select: none;
        }
        .symbol-btn { transition: all 0.1s ease; }
        .symbol-btn:active:not(:disabled) { transform: scale(0.9); }
        .symbol-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }

        .full-h {
            height: 100vh;
            height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        .feedback-icon {
            font-size: 8rem;
            position: absolute;
            z-index: 20;
            pointer-events: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .chart-container {
            width: 100%;
            height: 250px;
            margin-top: 1rem;
            display: none; 
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start">

    <div id="app" class="w-full max-w-2xl full-h bg-white shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- ส่วนแจ้งเตือน -->
        <div id="msg-box" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-black/80 text-white px-6 py-3 rounded-full text-lg font-bold transition-opacity duration-300 whitespace-nowrap"></div>

        <!-- แถบเฉลย (เฉพาะเกมที่ 1) -->
        <div id="key-panel" class="hidden p-2 sm:p-4 bg-gray-50 border-b-2 sm:border-b-4 border-gray-200 flex-shrink-0">
            <div class="flex justify-center gap-1 sm:gap-2"></div>
        </div>

        <!-- พื้นที่หลัก -->
        <div class="flex-1 flex flex-col items-center justify-between p-4 sm:p-6 overflow-y-auto overflow-x-hidden custom-scroll">
            
            <!-- 1. หน้าลงทะเบียน -->
            <div id="start-screen" class="flex flex-col items-center justify-center min-h-full text-center w-full py-4">
                <h1 class="text-3xl sm:text-4xl font-bold mb-6 sm:mb-8 text-blue-800 font-bold">ลงทะเบียนทดสอบ</h1>
                <div class="w-full max-w-sm space-y-4 mb-8">
                    <div class="text-left">
                        <label class="block text-lg font-bold text-gray-700 mb-1">รหัสประจำตัว</label>
                        <input type="text" id="user-id" placeholder="ไม่จำเป็นต้องระบุ" class="w-full p-3 sm:p-4 text-xl border-4 border-gray-200 rounded-2xl focus:border-blue-500 outline-none">
                    </div>
                    <div class="text-left">
                        <label class="block text-lg font-bold text-gray-700 mb-1">อายุ (ปี)</label>
                        <input type="number" id="user-age" min="1" max="120" placeholder="ใส่ตัวเลข 1-120" class="w-full p-3 sm:p-4 text-xl border-4 border-gray-200 rounded-2xl focus:border-blue-500 outline-none">
                    </div>
                </div>
                <button onclick="showInstructions(1)" class="bg-blue-600 hover:bg-blue-700 text-white text-2xl sm:text-3xl font-bold px-12 sm:px-16 py-4 sm:py-6 rounded-3xl shadow-xl active:scale-95 transition-transform">
                    ไปต่อ
                </button>
            </div>

            <!-- หน้าคำแนะนำ -->
            <div id="instruction-screen" class="hidden flex flex-col items-center justify-center min-h-full w-full text-center py-4">
                <h2 id="inst-title" class="text-3xl sm:text-4xl font-bold mb-6 sm:mb-8 text-gray-800 border-b-4 border-blue-600 pb-2 font-bold"></h2>
                <div class="space-y-6 text-left w-full mb-10">
                    <div class="bg-white p-6 sm:p-8 rounded-2xl border-l-8 border-blue-600 shadow-sm">
                        <h3 id="inst-subtitle" class="text-2xl sm:text-3xl font-bold text-blue-700 mb-4 font-bold"></h3>
                        <p id="inst-body" class="text-xl sm:text-2xl text-gray-700 leading-relaxed"></p>
                    </div>
                </div>
                <button id="inst-btn" class="bg-green-600 hover:bg-green-700 text-white text-3xl sm:text-4xl font-bold px-12 sm:px-16 py-6 sm:py-8 rounded-3xl shadow-xl active:scale-95 transition-transform w-full">
                    เข้าใจแล้ว เริ่มเกม
                </button>
            </div>

            <!-- หน้าเกมที่ 1 -->
            <div id="game-screen-l1" class="hidden w-full h-full flex flex-col items-center justify-between py-2 overflow-hidden">
                <div class="flex-1 flex items-center justify-center min-h-0 relative w-full">
                    <div id="feedback-l1" class="hidden feedback-icon"></div>
                    <div id="central-digit" class="text-[10rem] sm:text-[14rem] md:text-[16rem] font-black leading-none select-none">?</div>
                </div>
                <div id="button-container-l1" class="w-full grid grid-cols-4 sm:grid-cols-7 gap-2 sm:gap-3 mb-2 flex-shrink-0"></div>
            </div>

            <!-- หน้าเกมที่ 2 -->
            <div id="game-screen-l3" class="hidden w-full h-full flex flex-col items-center justify-between py-2 overflow-hidden">
                <div class="flex-1 flex items-center justify-center min-h-0 relative w-full">
                    <div id="feedback-l3" class="hidden feedback-icon"></div>
                    <div id="stroop-stimulus" class="text-7xl sm:text-9xl font-black leading-none select-none text-center"></div>
                </div>
                <div id="button-container-l3" class="w-full grid grid-cols-2 gap-4 mb-4 flex-shrink-0"></div>
            </div>

            <!-- หน้าพักระหว่างเกม -->
            <div id="transition-screen" class="hidden w-full min-h-full flex flex-col items-center justify-center text-center py-4">
                <h2 id="trans-title" class="text-3xl font-bold text-blue-600 mb-4 font-bold"></h2>
                <div class="bg-gray-50 p-6 sm:p-8 rounded-3xl border-2 sm:border-4 border-gray-200 w-full mb-6 text-center shadow-inner">
                    <div id="trans-subtitle" class="text-lg sm:text-xl text-gray-600 mb-2 font-bold"></div>
                    <div id="trans-summary" class="text-2xl sm:text-3xl font-bold text-gray-800 leading-relaxed"></div>
                </div>
                <button id="trans-btn" class="bg-green-600 hover:bg-green-700 text-white text-2xl sm:text-3xl font-bold px-12 sm:px-16 py-5 sm:py-6 rounded-3xl shadow-xl active:scale-95 transition-transform w-full">
                    ไปต่อ
                </button>
            </div>

            <!-- หน้าสรุปผลสุดท้าย -->
            <div id="final-screen" class="hidden w-full flex flex-col items-center py-4 min-h-full">
                <h2 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-6 font-bold">สรุปผลการทดสอบ</h2>
                
                <div id="final-report" class="w-full space-y-8 mb-8"></div>

                <p class="text-gray-400 text-sm mb-4 italic text-center">*ข้อมูลถูกบันทึกใน Console เรียบร้อยแล้ว (JSON format)</p>
                <button onclick="location.reload()" class="w-full bg-gray-800 text-white text-2xl font-bold py-5 rounded-2xl active:scale-95 transition-transform mt-auto">
                    กลับหน้าแรก
                </button>
            </div>

        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         */
        const FEEDBACK_DURATION = 400; 
        const PLAY_TIME = 60000; // 60 วินาที

        const STROOP_COLORS = [
            { name: "แดง", hex: "#FF0000" },
            { name: "น้ำเงิน", hex: "#3366FF" },
            { name: "เขียว", hex: "#00BB00" },
            { name: "เหลือง", hex: "#FFCC00" }
        ];

        const ORIGINAL_SYMBOLS = ['—', '⊥', '⊓', '×', '⊔', '○', '△'];
        
        let activeKey = []; 
        let userData = { id: '', age: 0 };
        
        let l1FullLogs = []; 
        let l3FullLogs = [];
        let l1Stats = { total: 0, wrong: 0 };
        let l3Stats = { total: 0, wrong: 0 };
        
        let practiceCount = 0;
        let gameStartTime = null; 
        let currentTimer = null;
        let isProcessingInput = false;
        let currentDigit = null;
        let currentStroop = {};
        let realGameStarted = false;

        let lastL1Digit = null;
        let lastStroopColor = null;

        function showMessage(msg, isError = false) {
            const box = document.getElementById('msg-box');
            box.innerText = msg;
            box.style.backgroundColor = isError ? 'rgba(220, 38, 38, 0.9)' : 'rgba(0, 0, 0, 0.8)';
            box.classList.remove('hidden');
            setTimeout(() => { box.classList.add('hidden'); }, 3000);
        }

        function randomizeActiveKey() {
            const shuffledSymbols = [...ORIGINAL_SYMBOLS].sort(() => Math.random() - 0.5);
            activeKey = [];
            for (let i = 1; i <= 7; i++) {
                activeKey.push({ digit: i, symbol: shuffledSymbols[i-1] });
            }
        }

        function showInstructions(level) {
            let idInput = document.getElementById('user-id').value;
            const ageInput = parseInt(document.getElementById('user-age').value);
            
            if (level === 1) {
                if (!idInput) {idInput = "anonymous";} else {idInput = idInput.trim()}
                if (isNaN(ageInput) || ageInput < 1 || ageInput > 120) return showMessage('กรุณากรอกอายุที่ถูกต้อง (1 - 120 ปี)', true);
                userData.id = idInput;
                userData.age = ageInput;
            }

            const screens = ['start-screen', 'instruction-screen', 'game-screen-l1', 'game-screen-l3', 'transition-screen', 'final-screen'];
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById('key-panel').classList.add('hidden');

            const inst = document.getElementById('instruction-screen');
            inst.classList.remove('hidden');

            const title = document.getElementById('inst-title');
            const subtitle = document.getElementById('inst-subtitle');
            const body = document.getElementById('inst-body');
            const btn = document.getElementById('inst-btn');

            if (level === 1) {
                title.innerText = "คำแนะนำการเล่น";
                subtitle.innerText = "เกมที่ 1 \"จับคู่รหัสสัญลักษณ์\"";
                subtitle.className = "text-2xl sm:text-3xl font-bold text-blue-700 mb-4 font-bold";
                body.innerText = "ดูตัวเลขตรงกลางหน้าจอ แล้วเลือกรูปสัญลักษณ์ข้างล่างที่คู่กับเลขนั้น (ดูคู่ของเลขกับสัญลักษณ์จากตารางข้างบน)";
                btn.onclick = startLevel1;
            } else if (level === 3) {
                title.innerText = "คำแนะนำเกมต่อไป";
                subtitle.innerText = "เลือกสีนะ ไม่ใช่ชื่อ";
                subtitle.className = "text-2xl sm:text-3xl font-bold text-blue-700 mb-4 font-bold font-bold";
                // ปรับปรุงคำอธิบายตามคำขอ: สีแดงเป็นสีเขียวตัวหนา และ ปุ่มสีเขียวมีพื้นเทาเข้ม
                body.innerHTML = "ให้กดปุ่มตาม <span class='text-blue-600 font-bold'>'สี'</span> ที่ตาเห็น ไม่ต้องสนใจว่าคำนั้นเขียนว่าสีอะไร (เช่น เห็นคำว่า <span class='text-[#00BB00] font-bold'>สีแดง</span> แต่ตัวหนังสือเป็นสีเขียว ให้กดปุ่ม <span class='bg-slate-700 text-white px-2 py-0.5 rounded shadow-sm inline-block'>สีเขียว</span>)";
                btn.onclick = startLevel3;
            }
        }

        function startLevel1() {
            randomizeActiveKey();
            document.getElementById('instruction-screen').classList.add('hidden');
            document.getElementById('key-panel').classList.remove('hidden');
            document.getElementById('game-screen-l1').classList.remove('hidden');
            
            l1FullLogs = [];
            l1Stats = { total: 0, wrong: 0 };
            practiceCount = 0;
            realGameStarted = false;
            gameStartTime = Date.now(); 
            lastL1Digit = null;
            
            renderKey();
            nextQuestionL1();
        }

        function renderKey() {
            const container = document.querySelector('#key-panel > div');
            container.innerHTML = activeKey.map(item => `
                <div class="flex flex-col border-2 sm:border-4 border-gray-300 rounded-xl sm:rounded-2xl overflow-hidden w-11 sm:w-24 bg-white shadow-md">
                    <div class="text-center py-1 sm:py-2 font-black text-lg sm:text-4xl border-b-2 sm:border-b-4 border-gray-300 bg-gray-50">${item.digit}</div>
                    <div class="text-center py-2 sm:py-3 text-xl sm:text-6xl font-bold text-blue-600">${item.symbol}</div>
                </div>
            `).join('');
        }

        function nextQuestionL1() {
            let nextDigit;
            do {
                nextDigit = activeKey[Math.floor(Math.random() * activeKey.length)].digit;
            } while (nextDigit === lastL1Digit);
            lastL1Digit = nextDigit;
            currentDigit = nextDigit;

            document.getElementById('central-digit').innerText = currentDigit;
            document.getElementById('central-digit').classList.remove('hidden');
            renderButtonsL1();
        }

        function renderButtonsL1() {
            const container = document.getElementById('button-container-l1');
            const shuffled = [...activeKey].sort(() => Math.random() - 0.5);
            container.innerHTML = shuffled.map(item => `
                <button onclick="handleL1Input(${item.digit}, this)" class="symbol-btn h-16 sm:h-32 bg-white border-2 sm:border-4 border-gray-300 rounded-xl sm:rounded-3xl text-3xl sm:text-6xl font-bold text-gray-800 shadow-md">
                    ${item.symbol}
                </button>
            `).join('');
        }

        function handleL1Input(clickedDigit, btnEl) {
            if (isProcessingInput) return;
            isProcessingInput = true;

            const isCorrect = clickedDigit === currentDigit;
            const correctItem = activeKey.find(k => k.digit === currentDigit);
            const clickedItem = activeKey.find(k => k.digit === clickedDigit);

            let now = Date.now();
            let timeElapsed = ((now - gameStartTime) / 1000).toFixed(3);
            let label = !realGameStarted ? `ซ้อม ${practiceCount + 1}` : `${l1Stats.total + 1}`;

            l1FullLogs.push({
                "ข้อที่": label,
                "เฉลย": `${currentDigit} (${correctItem.symbol})`,
                "กดอะไร": `${clickedDigit} (${clickedItem.symbol})`,
                "สถานะ": isCorrect ? "ถูก" : "ผิด",
                "เวลาที่กด": parseFloat(timeElapsed),
                "isCorrect": isCorrect
            });

            if (realGameStarted) {
                l1Stats.total++;
                if (!isCorrect) l1Stats.wrong++;
            }

            showFeedback(isCorrect, 'feedback-l1', 'central-digit');
            if (!isCorrect) btnEl.classList.add('bg-red-500', 'border-red-700', 'text-white', 'animate-shake');

            const btns = document.querySelectorAll('#button-container-l1 button');
            btns.forEach(b => b.disabled = true);

            setTimeout(() => {
                isProcessingInput = false;
                if (!realGameStarted && isCorrect) {
                    practiceCount++;
                    if (practiceCount === 3) {
                        realGameStarted = true;
                        gameStartTime = Date.now(); 
                        currentTimer = setTimeout(() => endTimedGame(1), PLAY_TIME);
                    }
                }
                document.getElementById('feedback-l1').classList.add('hidden');
                nextQuestionL1();
            }, FEEDBACK_DURATION);
        }

        function startLevel3() {
            document.getElementById('instruction-screen').classList.add('hidden');
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('game-screen-l3').classList.remove('hidden');
            document.getElementById('key-panel').classList.add('hidden');

            l3FullLogs = [];
            l3Stats = { total: 0, wrong: 0 };
            practiceCount = 0;
            realGameStarted = false;
            gameStartTime = Date.now();
            lastStroopColor = null;

            renderStroopButtons();
            nextStroopQuestion();
        }

        function renderStroopButtons() {
            const container = document.getElementById('button-container-l3');
            container.innerHTML = STROOP_COLORS.map(c => `
                <button onclick="handleL3Input('${c.name}', this)" 
                        class="symbol-btn bg-slate-700 text-white rounded-2xl h-20 sm:h-28 text-3xl sm:text-4xl font-bold shadow-lg border-b-4 border-slate-900 active:border-b-0 active:translate-y-1">
                    ${c.name}
                </button>
            `).join('');
        }

        function nextStroopQuestion() {
            let colorIdx;
            do {
                colorIdx = Math.floor(Math.random() * STROOP_COLORS.length);
            } while (STROOP_COLORS[colorIdx].hex === lastStroopColor);
            
            const wordIdx = Math.floor(Math.random() * STROOP_COLORS.length);
            
            lastStroopColor = STROOP_COLORS[colorIdx].hex;
            currentStroop = {
                word: STROOP_COLORS[wordIdx].name,
                colorHex: STROOP_COLORS[colorIdx].hex,
                colorName: STROOP_COLORS[colorIdx].name
            };

            const stimulus = document.getElementById('stroop-stimulus');
            stimulus.innerText = currentStroop.word;
            stimulus.style.color = currentStroop.colorHex;
            stimulus.classList.remove('hidden');

            const btns = document.querySelectorAll('#button-container-l3 button');
            btns.forEach(b => b.disabled = false);
        }

        function handleL3Input(clickedName, btnEl) {
            if (isProcessingInput) return;
            isProcessingInput = true;

            const isCorrect = clickedName === currentStroop.colorName;
            let now = Date.now();
            let timeElapsed = ((now - gameStartTime) / 1000).toFixed(3);
            let label = !realGameStarted ? `ซ้อม ${practiceCount + 1}` : `${l3Stats.total + 1}`;

            l3FullLogs.push({
                "ข้อที่": label,
                "คำที่โชว์": currentStroop.word,
                "สีที่โชว์": currentStroop.colorName,
                "กดสี": clickedName,
                "สถานะ": isCorrect ? "ถูก" : "ผิด",
                "เวลาที่กด": parseFloat(timeElapsed),
                "isCorrect": isCorrect
            });

            if (realGameStarted) {
                l3Stats.total++;
                if (!isCorrect) l3Stats.wrong++;
            }

            showFeedback(isCorrect, 'feedback-l3', 'stroop-stimulus');
            
            const btns = document.querySelectorAll('#button-container-l3 button');
            btns.forEach(b => b.disabled = true);

            setTimeout(() => {
                isProcessingInput = false;
                if (!realGameStarted && isCorrect) {
                    practiceCount++;
                    if (practiceCount === 3) {
                        realGameStarted = true;
                        gameStartTime = Date.now();
                        currentTimer = setTimeout(() => endTimedGame(3), PLAY_TIME);
                    }
                }
                document.getElementById('feedback-l3').classList.add('hidden');
                nextStroopQuestion();
            }, FEEDBACK_DURATION);
        }

        function showFeedback(isCorrect, feedbackId, hideId) {
            const f = document.getElementById(feedbackId);
            const h = document.getElementById(hideId);
            h.classList.add('hidden');
            f.innerText = isCorrect ? "✅" : "❌";
            f.classList.remove('hidden');
        }

        function endTimedGame(level) {
            clearTimeout(currentTimer);
            document.getElementById(`game-screen-l${level === 3 ? 3 : 1}`).classList.add('hidden');
            document.getElementById('key-panel').classList.add('hidden');
            document.getElementById('transition-screen').classList.remove('hidden');
            
            const title = document.getElementById('trans-title');
            const subtitle = document.getElementById('trans-subtitle');
            const summary = document.getElementById('trans-summary');
            const btn = document.getElementById('trans-btn');

            if (level === 1) {
                title.innerText = "จบเกมที่ 1";
                subtitle.innerText = "คะแนนของคุณ";
                const realLogs = l1FullLogs.filter(l => !l.ข้อที่.toString().startsWith('ซ้อม'));
                const correct = realLogs.filter(l => l.สถานะ === "ถูก").length;
                const total = l1Stats.total;
                const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
                summary.innerHTML = `<div class="mb-2">ตอบถูกทั้งหมด</div><div class="text-blue-600 text-6xl font-black">${correct}</div><div class="mt-4 text-gray-500 font-bold">ความแม่นยำ ${acc}% (ผิด ${l1Stats.wrong} ครั้ง)</div>`;
                btn.onclick = () => showInstructions(3);
            } else if (level === 3) {
                title.innerText = "จบเกมที่ 2";
                subtitle.innerText = "คะแนนเกม เลือกสีนะ ไม่ใช่ชื่อ";
                const realLogs = l3FullLogs.filter(l => !l.ข้อที่.toString().startsWith('ซ้อม'));
                const correct = realLogs.filter(l => l.สถานะ === "ถูก").length;
                const total = l3Stats.total;
                const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
                summary.innerHTML = `<div class="mb-2">ตอบถูกทั้งหมด</div><div class="text-blue-600 text-6xl font-black">${correct}</div><div class="mt-4 text-gray-500 font-bold">ความแม่นยำ ${acc}% (ผิด ${l3Stats.wrong} ครั้ง)</div>`;
                btn.innerText = "ไปต่อ"; 
                btn.onclick = showFinalResult;
            }
        }

        function createReactionTimeChart(canvasId, title, logs) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const realLogs = logs.filter(l => !l.ข้อที่.toString().startsWith('ซ้อม'));
            if (realLogs.length === 0) return;

            const dataPoints = realLogs.map((log, index) => {
                const prevTime = index === 0 ? 0 : realLogs[index - 1].เวลาที่กด;
                const rt = log.เวลาที่กด - prevTime;
                return { x: log.เวลาที่กด * 1000, y: rt, isCorrect: log.isCorrect };
            });

            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Reaction Time (s)',
                        data: dataPoints,
                        borderColor: '#94a3b8',
                        borderWidth: 1,
                        fill: false,
                        tension: 0,
                        pointRadius: 6,
                        pointBackgroundColor: dataPoints.map(p => p.isCorrect ? '#3b82f6' : '#ef4444'),
                        pointStyle: dataPoints.map(p => p.isCorrect ? 'circle' : 'crossRot')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', min: 0, max: PLAY_TIME, title: { display: true, text: 'เวลา (ms)' } },
                        y: { beginAtZero: true, title: { display: true, text: 'วินาทีต่อข้อ' } }
                    }
                }
            });
        }

        function toggleChart(containerId) {
            const container = document.getElementById(containerId);
            container.style.display = container.style.display === 'block' ? 'none' : 'block';
        }

        function showFinalResult() {
            document.getElementById('key-panel').classList.add('hidden');
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            
            const l1Real = l1FullLogs.filter(l => !l.ข้อที่.toString().startsWith('ซ้อม'));
            const l1Correct = l1Real.filter(l => l.สถานะ === "ถูก").length;
            const l1Acc = l1Stats.total > 0 ? Math.round((l1Correct / l1Stats.total) * 100) : 0;

            const l3Real = l3FullLogs.filter(l => !l.ข้อที่.toString().startsWith('ซ้อม'));
            const l3Correct = l3Real.filter(l => l.สถานะ === "ถูก").length;
            const l3Acc = l3Stats.total > 0 ? Math.round((l3Correct / l3Stats.total) * 100) : 0;
            
            const finalData = {
                id: userData.id,
                age: userData.age,
                symbol_detail: l1FullLogs, 
                symbol_correct: l1Correct,
                symbol_precision: l1Acc,
                stroop_detail: l3FullLogs,
                stroop_correct: l3Correct,
                stroop_precision: l3Acc
            };

            const webhookUrl = 'https://playground.n8n.md.chula.ac.th/webhook/iAttention'; 
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalData),
            })
            .then(async response => {
                if (response.ok) showMessage(`บันทึกเรียบร้อย!`);
                else showMessage("เกิดข้อผิดพลาดในการบันทึก", true);
            })
            .catch(error => { showMessage("ไม่สามารถเชื่อมต่อฐานข้อมูลได้", true); });

            const report = document.getElementById('final-report');
            report.innerHTML = `
                <div class="p-4 bg-blue-50 rounded-2xl border-2 border-blue-200 shadow-sm">
                    <p class="text-xl">ID: <strong>${userData.id}</strong> | อายุ: <strong>${userData.age} ปี</strong></p>
                </div>

                <div class="p-6 bg-white rounded-3xl border-2 border-gray-200 shadow-md">
                    <h4 class="font-bold text-blue-800 underline mb-4 font-bold">เกมที่ 1: รหัสสัญลักษณ์</h4>
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-gray-500 text-lg">ตอบถูก:</span>
                        <span class="text-6xl font-black text-blue-600">${l1Correct}</span>
                        <span class="text-xl font-bold text-gray-400">ข้อ</span>
                    </div>
                    <div class="flex items-end gap-2 mb-4">
                        <span class="text-gray-500 text-lg">ความแม่นยำ:</span>
                        <span class="text-5xl font-black text-green-600">${l1Acc}%</span>
                    </div>
                    <button onclick="toggleChart('cont-l1')" class="text-4xl hover:scale-110 transition-transform p-2 bg-gray-50 rounded-xl">📊</button>
                    <div id="cont-l1" class="chart-container">
                        <canvas id="chart-l1"></canvas>
                    </div>
                </div>

                <div class="p-6 bg-white rounded-3xl border-2 border-gray-200 shadow-md">
                    <h4 class="font-bold text-blue-800 underline mb-4 font-bold">เกมที่ 2: เลือกสีนะ ไม่ใช่ชื่อ</h4>
                    <div class="flex items-end gap-2 mb-2">
                        <span class="text-gray-500 text-lg">ตอบถูก:</span>
                        <span class="text-6xl font-black text-blue-600">${l3Correct}</span>
                        <span class="text-xl font-bold text-gray-400">ข้อ</span>
                    </div>
                    <div class="flex items-end gap-2 mb-4">
                        <span class="text-gray-500 text-lg">ความแม่นยำ:</span>
                        <span class="text-5xl font-black text-green-600">${l3Acc}%</span>
                    </div>
                    <button onclick="toggleChart('cont-l3')" class="text-4xl hover:scale-110 transition-transform p-2 bg-gray-50 rounded-xl">📊</button>
                    <div id="cont-l3" class="chart-container">
                        <canvas id="chart-l3"></canvas>
                    </div>
                </div>
            `;

            setTimeout(() => {
                createReactionTimeChart('chart-l1', 'เกมรหัสสัญลักษณ์', l1FullLogs);
                createReactionTimeChart('chart-l3', 'Stroop Test', l3FullLogs);
            }, 100);
        }
    </script>
</body>
</html>
